services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./apps/api:/var/www/api
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vocare
      - DB_USERNAME=vocare
      - DB_PASSWORD=vocare_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./apps/frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vocare
      - DB_USERNAME=vocare
      - DB_PASSWORD=vocare_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  scheduler:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
    command: php artisan schedule:work
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vocare
      - DB_USERNAME=vocare
      - DB_PASSWORD=vocare_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=vocare
      - POSTGRES_USER=vocare
      - POSTGRES_PASSWORD=vocare_secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
