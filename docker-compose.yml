services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./apps/api:/var/www/api
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
      - expedientes_data:/var/www/api/storage/app/expedientes  # Persistencia de archivos subidos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # DB_* ya no se fija aquí: vivía duplicado con apps/api/.env y, al ser
    # una variable de entorno real del contenedor, pisaba en silencio el
    # DB_DATABASE=vocare_test que phpunit.xml intenta usar para los tests
    # (`php artisan test` terminaba corriendo — y con RefreshDatabase,
    # reseteando — la base de datos real de desarrollo). apps/api/.env sigue
    # siendo la fuente de verdad para DB_* en uso normal (mismos valores).
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./apps/frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
      - expedientes_data:/var/www/api/storage/app/expedientes  # Mismo volumen que api
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vocare
      - DB_USERNAME=vocare
      - DB_PASSWORD=vocare_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  scheduler:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
      - expedientes_data:/var/www/api/storage/app/expedientes  # Mismo volumen que api
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vocare
      - DB_USERNAME=vocare
      - DB_PASSWORD=vocare_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=vocare
      - POSTGRES_USER=vocare
      - POSTGRES_PASSWORD=vocare_secret
    ports:
      - "5433:5432"  # Host 5433 → Container 5432 (evita conflicto con postgres local)
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocare -d vocare"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  redis_data:
  expedientes_data:   # Volumen persistente para archivos subidos por postulantes
